<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício-05 | Formulário de Inscrição</title>
</head>
<body>
    <!-- Crie um arquivo HTML com um formulário de inscrição contendo os seguintes campos:
    
    Nome, que deve ser um input de texto
    Email, que deve ser um input de email
    WhatsApp, que deve ser um input de telefone
    Área de atuação, que deve ser um input de radio com as opções: Desenvolvimento, Quality Assurance (QA), Análise de Dados e Infraestrutura
    Observações, que deve ser uma textarea
    Uma checkbox com o rótulo “Desejo receber novidades e ofertas por email.” -->

    <h1>Formulário de Inscrição</h1>
    <form>
        <label for="name">Nome:</label>
        <input type="text" name="n" id="name" placeholder="Ex.: João" required>
        <br><br>

        <label for="email">E-mail:</label>
        <input type="email" name="e" id="email" placeholder="Ex.: example@email.com" required>
        <br><br>

        <label for="number">WhatsApp:</label>
        <input type="number" name="f" id="number" placeholder="Ex.: (00) 1234-5678">
        <br><br>

        <label>Área de atuação:</label><br>
        <input type="radio" name="dev" id="dev">
        <label for="dev">Desenvolvimento</label>
        <input type="radio" name="qa" id="qa">
        <label for="qa">Quality Assurance (QA)</label>
        <input type="radio" name="ad" id="ad">
        <label for="ad">Análise de Dados</label>
        <input type="radio" name="infra" id="infra">
        <label for="infra">Infraestrutura</label>
        <br><br>

        <label for="obs">Observações:</label><br>
        <textarea name="obs" id="obs" cols="30" rows="3"></textarea>
        <br><br>
        <input type="checkbox" name="news" id="news">
        <label for="news">Desejo receber novidades e ofertas por email.</label>
        <br>
        <button type="submit">Enviar</button>
    </form>
</body>
</html>
